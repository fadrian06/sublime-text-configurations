<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <meta name="color-scheme" content="light dark">
  <title></title>
  <link rel="icon" href="" />
  <link rel="stylesheet" href="" />
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.11/dist/cdn.min.js"></script>
  <script>
    Alpine.store('tabs', {
      current: 'first',

      items: ['first', 'second', 'third'],
    })
  </script>
</head>

<body>
  <div x-data>
    <template x-for="tab in $store.tabs.items">
      <div x-show="$store.tabs.current === tab" x-text="tab"></div>
    </template>
  </div>

  <div x-data>
    <button @click="$store.tabs.current = 'first'">First Tab</button>
    <button @click="$store.tabs.current = 'second'">Second Tab</button>
    <button @click="$store.tabs.current = 'third'">Third Tab</button>
  </div>
</body>

</html>
